<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opti-build PC | Valenciennes</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: #0b0e14; 
            color: white; 
        }
        
        header { 
            padding: 50px 20px; 
            text-align: center; 
            background: linear-gradient(180deg, #1a2a44 0%, #0b0e14 100%); 
            border-bottom: 2px solid #00d4ff;
        }

        .container { 
            max-width: 800px; 
            margin: auto; 
            padding: 20px; 
            text-align: center; 
        }

        .card {
            background: #161b22;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #30363d;
            margin-top: 20px;
        }

        /* LE BOUTON FLOTTANT (TON LOGO) */
        .wa-widget-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }

        .wa-button {
            width: 70px;
            height: 70px;
            background: #1a2a44;
            border-radius: 50%;
            border: 3px solid #00d4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(0, 212, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }

        /* FENETRE DE CHAT */
        #wa-box {
            display: none; /* Caché par défaut */
            width: 280px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .wa-header {
            background: #1a2a44;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
        }

        .wa-logo-in-chat {
            width: 40px;
            height: 40px;
            background: #0b0e14;
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #00d4ff;
        }

        .wa-content { padding: 20px; color: #333; background: #f0f2f5; font-size: 14px; }

        .wa-link {
            display: block;
            margin: 10px;
            background: #25d366;
            color: white;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0;">OPTI-BUILD PC</h1>
        <p style="color:#00d4ff; margin:5px 0 0 0;">MONTAGE SUR MESURE VALENCIENNES</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>Expertise & Passion</h2>
            <p>Plus de 30 clients m'ont déjà fait confiance pour leur setup.</p>
            <ul style="list-style:none; padding:0; text-align:left; display:inline-block;">
                <li>✅ Montage soigné</li>
                <li>✅ Optimisation FPS</li>
                <li>✅ Devis gratuit</li>
            </ul>
        </div>
    </div>

    <div class="wa-widget-container">
        <div id="wa-box">
            <div class="wa-header">
                <div class="wa-logo-in-chat">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#00d4ff" stroke-width="2">
                        <rect x="5" y="3" width="14" height="18" rx="2"/>
                        <circle cx="12" cy="8" r="3"/>
                    </svg>
                </div>
                <div>
                    <strong>Opti-build PC</strong><br>
                    <span style="font-size:10px; color:#00d4ff;">En ligne</span>
                </div>
            </div>
            <div class="wa-content">Bonjour ! Un projet PC en tête ? Je vous réponds ici.</div>
            <a href="https://wa.me/33769188046" class="wa-link" target="_blank">Discuter sur WhatsApp</a>
        </div>

        <div class="wa-button" onclick="toggleChat()">
            <svg viewBox="0 0 24 24" width="45" height="45" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="3" width="14" height="18" rx="2"/>
                <circle cx="12" cy="8" r="3"/>
                <path d="M9 15h6M9 18h3"/>
            </svg>
        </div>
    </div>

    <script>
        function toggleChat() {
            var box = document.getElementById('wa-box');
            if (box.style.display === 'none' || box.style.display === '') {
                box.style.display = 'block';
            } else {
                box.style.display = 'none';
            }
        }
    </script>

</body>
</html>
